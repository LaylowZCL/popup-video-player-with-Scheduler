<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Video Popup</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="video-container">
    <video id="videoPlayer" preload="metadata">
      Seu navegador não suporta o elemento de vídeo.
    </video>
    
    <!-- Overlay de carregamento -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>
    
    <!-- Controles do player -->
    <div class="video-controls" id="videoControls">
      <!-- Barra de progresso -->
      <div class="progress-bar-container" id="progressBarContainer">
        <div class="progress-tooltip" id="progressTooltip">0:00</div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-filled" id="progressFilled"></div>
          <div class="progress-handle" id="progressHandle"></div>
        </div>
        <div class="buffered-bar" id="bufferedBar"></div>
        <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" step="0.1" value="0" aria-label="Progresso do vídeo">
      </div>
      
      <!-- Controles principais -->
      <div class="controls-main">
        <div class="controls-left">
          <button class="control-btn" id="playPauseBtn" title="Play/Pause">
            <svg class="icon play-icon" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="icon pause-icon" viewBox="0 0 24 24">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          
          <div class="volume-container">
            <button class="control-btn" id="volumeBtn" title="Mute/Unmute">
              <svg class="icon volume-up-icon" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              </svg>
              <svg class="icon volume-down-icon" viewBox="0 0 24 24">
                <path d="M5 9v6h4l5 5V4L9 9H5zm7 0v6h2V9h-2z"/>
              </svg>
              <svg class="icon volume-off-icon" viewBox="0 0 24 24">
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
              </svg>
            </button>
            <div class="volume-slider-container" id="volumeSliderContainer">
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
            </div>
          </div>
          
          <div class="time-display">
            <span id="currentTime">0:00</span>
            <span class="time-separator">/</span>
            <span id="duration">0:00</span>
          </div>
        </div>
        
        <div class="controls-right">
          <button class="control-btn" id="subtitleBtn" title="Legendas">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM4 6h16v12H4V6zm4 3h2v2H8V9zm0 3h2v2H8v-2zm3-3h2v2h-2V9zm0 3h2v2h-2v-2zm3-3h2v2h-2V9zm0 3h2v2h-2v-2z"/>
            </svg>
          </button>
          
          <button class="control-btn" id="loopBtn" title="Repetir">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
            </svg>
          </button>
          
          <button class="control-btn" id="speedBtn" title="Velocidade">
            <span class="speed-text">1x</span>
          </button>
          
          <button class="control-btn" id="fullscreenBtn" title="Tela Cheia">
            <svg class="icon fullscreen-enter-icon" viewBox="0 0 24 24">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
            <svg class="icon fullscreen-exit-icon" viewBox="0 0 24 24">
              <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Container de legendas -->
    <div class="subtitle-container" id="subtitleContainer">
      <div class="subtitle-text" id="subtitleText"></div>
    </div>
    
    <!-- Menu de legendas -->
    <div class="subtitle-menu" id="subtitleMenu">
      <div class="subtitle-menu-header">
        <h3>Legendas</h3>
        <button class="close-btn" id="closeSubtitleMenu">×</button>
      </div>
      <div class="subtitle-menu-content">
        <div class="subtitle-actions">
          <button class="subtitle-action-btn" id="loadSubtitleFile">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
            </svg>
            Carregar Arquivo SRT
          </button>
          <button class="subtitle-action-btn" id="loadSubtitleURL">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Baixar da URL
          </button>
        </div>
        <div class="subtitle-list" id="subtitleList">
          <!-- Lista de legendas será preenchida dinamicamente -->
        </div>
        <div class="subtitle-controls">
          <label class="checkbox-label">
            <input type="checkbox" id="subtitleToggle">
            <span class="checkmark"></span>
            Habilitar Legendas
          </label>
        </div>
      </div>
    </div>
    
    <!-- Botão de fechar -->
    <button class="close-btn" id="closeButton">×</button>
  </div>
  <script src="./script.js"></script>

  <!-- Adicione no final do body, antes do fechamento -->
  <script>
    // Função global para ser chamada do main.js
    window.reportWindowClose = function () {
        if (window.videoPlayer && !window.hasVideoCompleted && window.videoPlayer.currentTime > 0) {
            // Chama a função que já existe no script.js
            if (typeof reportVideoEvent === 'function') {
                reportVideoEvent('video_interrupted', {
                    final_position: window.videoPlayer.currentTime,
                    interruption_reason: 'window_minimized',
                    video_duration: window.videoDuration
                });
            }
        }
    };
</script>
</body>

</html>
