<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            font-weight: bold;
            z-index: 1000;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <iframe id="ytplayer" allowfullscreen></iframe>
    <button class="close-btn" id="closeButton">×</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('ytplayer').src = params.get('videoUrl');
        
        document.getElementById('closeButton').addEventListener('click', () => {
            window.close();
        });
    </script>
</body>
</html>
